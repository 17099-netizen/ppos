name: Trigger Puppeteer Cron

on:
  # 1. รองรับการยิงปลุกจากภายนอกผ่าน API
  repository_dispatch:
    types: [trigger_my_puppeteer]
    
  # 2. (เลือกเปิดเพิ่มได้) รองรับการตั้งเวลาวิ่งอัตโนมัติในตัว GitHub เอง
  schedule:
    - cron: '0 * * * *' # รันทุกต้นชั่วโมง

jobs:
  run-puppeteer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install puppeteer
          # หรือถ้าคุณมีไฟล์ package.json อยู่แล้ว ให้ใช้คำสั่ง npm install แทนได้เลย

      - name: Run Script
        run: node index.js
